<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · LUMÉ Skin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand__mark">L</span>
      <span class="brand__text">LUMÉ<em>Skin</em></span>
    </div>
    <h1>Reset Password</h1>
    <p class="login-sub">Choose a new password for your admin account.</p>

    <p class="login-error" id="err" hidden></p>
    <p class="save-toast" id="ok" hidden>✓ Password updated! Redirecting you to sign in…</p>

    <form id="form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username" readonly />
      </div>
      <div class="field">
        <label for="pass">New password</label>
        <div class="pass-wrap">
          <input type="password" id="pass" autocomplete="new-password" placeholder="At least 8 characters" required />
          <button type="button" class="pass-toggle" id="passToggle" aria-label="Show password">
            <svg class="ic-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="ic-eyeoff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="pass2">Confirm password</label>
        <input type="password" id="pass2" autocomplete="new-password" placeholder="Re-enter your password" required />
      </div>
      <button type="submit" class="abtn abtn--solid abtn--block" id="btn">Update password</button>
    </form>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var email = params.get("email") || "";
      var token = params.get("token") || "";
      document.getElementById("email").value = email;

      var err = document.getElementById("err");
      var ok = document.getElementById("ok");
      var btn = document.getElementById("btn");
      var pass = document.getElementById("pass");
      var pass2 = document.getElementById("pass2");

      var toggle = document.getElementById("passToggle");
      toggle.addEventListener("click", function () {
        var reveal = pass.type === "password";
        pass.type = reveal ? "text" : "password";
        toggle.classList.toggle("is-shown", reveal);
        toggle.setAttribute("aria-label", reveal ? "Hide password" : "Show password");
      });

      if (!token || !email) {
        err.textContent = "This link is missing information. Please use the link from your email.";
        err.hidden = false;
      }

      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();
        err.hidden = true;
        if (pass.value.length < 8) { err.textContent = "Password must be at least 8 characters."; err.hidden = false; return; }
        if (pass.value !== pass2.value) { err.textContent = "Passwords do not match."; err.hidden = false; return; }
        btn.disabled = true; btn.textContent = "Saving…";

        fetch("/api/reset", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ email: email, token: token, password: pass.value })
        }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
          .then(function (r) {
            if (r.ok) { ok.hidden = false; setTimeout(function () { location.href = "login.html"; }, 1600); }
            else { err.textContent = (r.d && r.d.error) || "Could not update password."; err.hidden = false; btn.disabled = false; btn.textContent = "Update password"; }
          }).catch(function () { err.textContent = "Network error. Please try again."; err.hidden = false; btn.disabled = false; btn.textContent = "Update password"; });
      });
    })();
  </script>
</body>
</html>
